<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lectoría — Tienda de libros</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header__inner">
      <div class="logo">
        <span class="logo__icon">📖</span>
        <span class="logo__name">Lectoría</span>
      </div>
      <nav class="nav">
        <button class="nav__btn active" data-cat="todos">Todos</button>
        <button class="nav__btn" data-cat="novela">Novela</button>
        <button class="nav__btn" data-cat="ciencia">Ciencia</button>
        <button class="nav__btn" data-cat="filosofia">Filosofía</button>
        <button class="nav__btn" data-cat="fantasia">Fantasía</button>
      </nav>
      <button class="cart-toggle" id="cartToggle" aria-label="Abrir carrito">
        <span class="cart-toggle__icon">🛒</span>
        <span class="cart-toggle__count" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero__text">
      <h1 class="hero__title">Historias que<br/><em>transforman</em></h1>
      <p class="hero__sub">Más de 200 títulos cuidadosamente seleccionados.</p>
    </div>
    <div class="hero__deco" aria-hidden="true">
      <span>📚</span><span>✍️</span><span>🔖</span>
    </div>
  </section>

  <!-- BUSCADOR -->
  <section class="search-bar">
    <input type="text" id="searchInput" placeholder="Buscar por título o autor…" aria-label="Buscar libro"/>
    <span class="search-bar__icon">🔍</span>
  </section>

  <!-- CATÁLOGO -->
  <main class="main">
    <div class="catalog" id="catalog"></div>
    <p class="empty-msg" id="emptyMsg" hidden>No hay libros que coincidan.</p>
  </main>

  <!-- CARRITO (panel lateral) -->
  <aside class="cart" id="cart" aria-hidden="true">
    <div class="cart__header">
      <h2 class="cart__title">Tu carrito</h2>
      <button class="cart__close" id="cartClose" aria-label="Cerrar carrito">✕</button>
    </div>
    <div class="cart__items" id="cartItems"></div>
    <div class="cart__footer">
      <div class="cart__total">
        <span>Total</span>
        <strong id="cartTotal">$0.00</strong>
      </div>
      <button class="btn-primary" id="checkoutBtn">Finalizar compra</button>
      <button class="btn-ghost" id="clearBtn">Vaciar carrito</button>
    </div>
  </aside>
  <div class="overlay" id="overlay"></div>

  <!-- TOAST -->
  <div class="toast" id="toast" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
